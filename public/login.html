<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="shortcut icon" href="icons/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – VEPA AutoCare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#F7F3EE; --card:#EDE9E0; --border:#D0C9BE; --muted:#9C9389;
      --body:#3D3730; --dark:#1C1917; --red:#C8381A; --red-dk:#A02E14;
      --fd:'Barlow Condensed',sans-serif; --fb:'Nunito Sans',sans-serif;
      --ease:0.25s ease; --r:10px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body {
      font-family:var(--fb);
      display:grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      height:100vh;
      overflow:hidden;
    }
    @media(max-width:768px){
      body { height:auto; overflow:auto; }
    }
    a{text-decoration:none;color:inherit;}

    /* ── PRELOADER ── */
    #preloader{position:fixed;inset:0;background:var(--dark);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.25rem;transition:opacity .55s ease,visibility .55s ease;}
    #preloader.done{opacity:0;visibility:hidden;}
    .pl-logo{font-family:var(--fd);font-size:clamp(3rem,10vw,5rem);font-weight:800;letter-spacing:.08em;color:var(--bg);animation:pl-pulse 1.4s ease-in-out infinite;}
    .pl-track{width:120px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
    .pl-fill{height:100%;width:0;background:var(--red);border-radius:2px;animation:pl-fill 1.1s cubic-bezier(.4,0,.2,1) forwards .2s;}
    @keyframes pl-pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes pl-fill{from{width:0}to{width:100%}}

    /* ── LEFT PANEL (brand) ── */
    .brand-panel {
      background:var(--dark);
      display:flex;flex-direction:column;justify-content:space-between;
      padding:2.5rem;position:relative;overflow:hidden;
    }
    .brand-bg-video {
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.22;z-index:0;
    }
    .brand-shade {
      position:absolute;inset:0;z-index:1;
      background:linear-gradient(180deg,rgba(28,25,23,.7) 0%,rgba(28,25,23,.9) 100%);
    }
    .brand-content {position:relative;z-index:2;display:flex;flex-direction:column;height:100%;}
    .logo {font-family:var(--fd);font-size:2rem;font-weight:800;letter-spacing:.06em;color:var(--bg);}
    .logo em{color:var(--red);font-style:normal;}
    .brand-mid {margin-top:auto;margin-bottom:auto;}
    .brand-headline {
      font-family:var(--fd);font-size:clamp(2.5rem,4vw,4rem);font-weight:800;
      text-transform:uppercase;color:var(--bg);line-height:.96;margin-bottom:1.25rem;
    }
    .brand-headline em{color:var(--red);font-style:normal;}
    .brand-sub {font-size:.9rem;color:rgba(247,243,238,.55);line-height:1.7;max-width:340px;}
    .brand-footer {display:flex;align-items:center;gap:.75rem;}
    .brand-footer-dot {width:6px;height:6px;border-radius:50%;background:var(--red);}
    .brand-footer-text {font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(247,243,238,.35);}

    /* ── RIGHT PANEL (form) ── */
    .form-panel {
      background:var(--bg);display:flex;flex-direction:column;
      justify-content:center;align-items:center;padding:3rem 2.5rem;
      overflow-y:auto;
    }
    .form-box {width:100%;max-width:400px;}
    .form-box h1 {
      font-family:var(--fd);font-size:2.4rem;font-weight:800;text-transform:uppercase;
      color:var(--dark);margin-bottom:.35rem;letter-spacing:.02em;
    }
    .form-box .sub {font-size:.88rem;color:var(--muted);margin-bottom:2.25rem;}
    .form-box .sub a {color:var(--red);font-weight:600;}
    .form-box .sub a:hover {text-decoration:underline;}

    /* Fields */
    .field {display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.1rem;}
    .field label {font-size:.72rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
    .field-wrap {position:relative;}
    .field-wrap input {
      width:100%;padding:.8rem 1rem;padding-right:2.75rem;
      border:1.5px solid var(--border);border-radius:8px;
      font-family:var(--fb);font-size:.95rem;color:var(--body);
      background:white;transition:border-color var(--ease),box-shadow var(--ease);
    }
    .field-wrap input:focus {border-color:var(--red);box-shadow:0 0 0 3px rgba(200,56,26,.12);outline:none;}
    .field-wrap input::placeholder {color:var(--border);}
    .field-wrap .field-icon {
      position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
      color:var(--border);font-size:1rem;pointer-events:none;
    }
    .pw-toggle {
      position:absolute;right:.9rem;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:var(--muted);font-size:.85rem;
      transition:color var(--ease);
    }
    .pw-toggle:hover{color:var(--body);}

    /* Submit */
    .btn-submit {
      width:100%;padding:.9rem;margin-top:.5rem;
      background:var(--red);color:#fff;border:none;border-radius:8px;
      font-family:var(--fb);font-size:.9rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;cursor:pointer;
      transition:background var(--ease),transform var(--ease),box-shadow var(--ease);
    }
    .btn-submit:hover {background:var(--red-dk);transform:translateY(-1px);box-shadow:0 6px 20px rgba(200,56,26,.3);}
    .btn-submit:active {transform:translateY(0);}
    .btn-submit:disabled {opacity:.55;cursor:not-allowed;transform:none;box-shadow:none;}

    /* Divider */
    .divider {display:flex;align-items:center;gap:1rem;margin:1.5rem 0;}
    .divider::before,.divider::after {content:'';flex:1;height:1px;background:var(--border);}
    .divider span {font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}

    /* Alt action */
    .alt-action {
      display:flex;align-items:center;justify-content:center;gap:.6rem;
      padding:.8rem;border:1.5px solid var(--border);border-radius:8px;
      font-size:.88rem;font-weight:600;color:var(--body);
      transition:border-color var(--ease),background var(--ease);
    }
    .alt-action:hover{border-color:var(--body);background:rgba(0,0,0,.03);}

    /* Error */
    #error-msg {
      margin-top:.9rem;padding:.75rem 1rem;border-radius:8px;
      background:rgba(200,56,26,.08);border:1px solid rgba(200,56,26,.2);
      font-size:.85rem;color:var(--red);font-weight:500;
      display:none;
    }
    #error-msg.show{display:block;}

    /* Success */
    #success-msg {
      margin-top:.9rem;padding:.75rem 1rem;border-radius:8px;
      background:rgba(34,140,54,.08);border:1px solid rgba(34,140,54,.25);
      font-size:.85rem;color:#1a7a30;font-weight:500;display:none;
    }
    #success-msg.show{display:block;}

    .back-link {
      display:inline-flex;align-items:center;gap:.4rem;
      font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
      color:var(--muted);margin-top:2rem;transition:color var(--ease);
    }
    .back-link:hover{color:var(--body);}
    .back-link::before{content:'←';}

    @media(max-width:768px){
      body{grid-template-columns:1fr;}
      .brand-panel{display:none;}
      .form-panel{padding:2.5rem 1.5rem;}
    }
  </style>
</head>
<body>

<!-- PRELOADER -->
<div id="preloader">
  <div class="pl-logo">VEPA</div>
  <div class="pl-track"><div class="pl-fill"></div></div>
</div>

<!-- LEFT BRAND PANEL -->
<div class="brand-panel">
  <video class="brand-bg-video" autoplay muted loop playsinline>
    <source src="backgroundVids/wideshot.mp4" type="video/mp4">
  </video>
  <div class="brand-shade"></div>
  <div class="brand-content">
    <div class="logo">VEPA<em>.</em></div>
    <div class="brand-mid">
      <div class="brand-headline">Welcome<br><em>Back.</em></div>
      <p class="brand-sub">Albany's family-owned auto shop — honest service, quality vehicles, and real people who care.</p>
    </div>
    <div class="brand-footer">
      <div class="brand-footer-dot"></div>
      <span class="brand-footer-text">1904 Western Ave · Albany, NY 12203</span>
    </div>
  </div>
</div>

<!-- RIGHT FORM PANEL -->
<div class="form-panel">
  <div class="form-box">
    <h1>Sign In</h1>
    <p class="sub">Don't have an account? <a href="signup">Create one →</a></p>

    <div class="field">
      <label for="login-email">Email Address</label>
      <div class="field-wrap">
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" required>
        <span class="field-icon">✉</span>
      </div>
    </div>

    <div class="field">
      <label for="login-password">Password</label>
      <div class="field-wrap">
        <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
        <button class="pw-toggle" id="pw-toggle" type="button" aria-label="Show password">👁</button>
      </div>
    </div>

    <button class="btn-submit" id="login-btn" type="button">Sign In</button>

    <div id="error-msg"></div>
    <div id="success-msg">Signed in! Redirecting…</div>

    <div class="divider"><span>or</span></div>

    <a href="signup" class="alt-action">Create a new account</a>

    <a href="/" class="back-link">Back to Home</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBcKnjZm5LYqj5jx5VEqx9ywspgZyxNfsA",
    authDomain: "vepa-24b46.firebaseapp.com",
    projectId: "vepa-24b46",
    storageBucket: "vepa-24b46.appspot.app",
    messagingSenderId: "170936495301",
    appId: "1:170936495301:web:6f15b8fa08deeb01d5d4ac",
    measurementId: "G-F8NFZ6SRKR"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  /* Preloader */
  window.addEventListener('load', () => setTimeout(() => document.getElementById('preloader').classList.add('done'), 700));

  /* Password toggle */
  const pwField = document.getElementById('login-password');
  document.getElementById('pw-toggle').addEventListener('click', () => {
    const show = pwField.type === 'password';
    pwField.type = show ? 'text' : 'password';
    document.getElementById('pw-toggle').textContent = show ? '🙈' : '👁';
  });

  /* Login */
  const errEl = document.getElementById('error-msg');
  const sucEl = document.getElementById('success-msg');
  const btn = document.getElementById('login-btn');

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-password').value.trim();

    errEl.classList.remove('show'); sucEl.classList.remove('show');

    if (!email || !pw) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('show'); return; }

    btn.disabled = true; btn.textContent = 'Signing in…';

    try {
      const { user } = await signInWithEmailAndPassword(auth, email, pw);
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists() && snap.data().isAdmin) sessionStorage.setItem("admin-auth", "true");
      else sessionStorage.removeItem("admin-auth");
      sucEl.classList.add('show');
      setTimeout(() => window.location.href = "index.html", 900);
    } catch (err) {
      btn.disabled = false; btn.textContent = 'Sign In';
      const msgs = {
        'auth/user-not-found': 'No account found with that email.',
        'auth/wrong-password': 'Incorrect password. Please try again.',
        'auth/invalid-email': 'Please enter a valid email address.',
        'auth/too-many-requests': 'Too many attempts. Please try again later.',
        'auth/invalid-credential': 'Email or password is incorrect.',
      };
      errEl.textContent = msgs[err.code] || 'Login failed. Please check your credentials.';
      errEl.classList.add('show');
    }
  }

  btn.addEventListener('click', doLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
